<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="50%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="46" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.5"/>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="40" fill="#0A0E1A"/>
  <!-- Pulse waveform -->
  <polyline points="20,60 35,60 40,60 45,45 50,75 55,35 60,85 65,40 70,70 75,50 80,60 85,60 100,60" 
            fill="none" stroke="url(#pulse)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- P letter (faceted) -->
  <text x="60" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" 
        fill="url(#pulse)" text-anchor="middle" opacity="0.15">P</text>
</svg>
